name: 'Setup Go Environment'
description: 'Checks out code, sets up Go, and downloads modules'

runs:
  using: "composite"
  steps:
    - name: Setup Go
      uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 ## v6.0.2
      with:
        go-version-file: 'go.mod'
        cache: true

    - name: Download Modules
      shell: bash 
      run: go mod download
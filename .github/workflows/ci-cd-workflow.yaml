name: CI pipeline

on:
  pull_request:
    branches:
      - "staging"
    types:
      - labeled
      - synchronize

env:
  BASE_REPO: kerolosayman308/movie-reservation
  IMAGE_TAG: kerolosayman308/movie-reservation:backend-ci-1.0.${{ github.run_number }}

jobs:
  Check_Label:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'ci')
    steps:
      - run: echo "Checking the ci label of the pull request"

  Run_Tests:
    needs: ["Check_Label"]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd ## v6.3.0
        with:
          fetch-depth: 0
      - name: Initialize environment
        uses: ./.github/actions/setup-go-env

      - name: Test code
        run: go test -v ./...
        continue-on-error: true
      
  SAST:
    runs-on: "ubuntu-latest"
    needs: ["Check_Label"]
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd ## v6.3.0
        with:
          fetch-depth: 0

      - name: Initialize environment
        uses: ./.github/actions/setup-go-env

      - uses: sonarsource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9  ## v7.0.0
        name: Sonar testing
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube quality gate check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  ## v1.2.0
        timeout-minutes: 3
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
      - name: Generate Trivy vulnerability report
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 ## v0.35.0
        with:
          scan-type: "fs"
          output: trivy-report.json
          format: 'json'
          scan-ref: .
          exit-code: 0
      # this didnt work with error
      # This run of the CodeQL Action does not have permission to access the CodeQL Action API endpoints. This could be because the Action is running on a pull request from a fork. If not, please ensure the workflow has at least the 'security-events: read' permission. Details: Code scanning is not enabled for this repository. Please enable code scanning in the repository settings. - https://docs.github.com/rest
      # so it doesnt need a pull request so i can utilize this on merging to master os smth
      # - name: Upload Trivy vulnerability report to GitHub security
      #   uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc ## v4.34.1
      #   if: ${{ !cancelled() }} ## step runs regardless of success or failure, but allows the step to be skipped if the entire workflow run is canceled
      #   with:
      #     sarif_file: trivy-report.sarif

      - name: Upload Trivy code report as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  ## v7.0.0 
        if: ${{ !cancelled() }}
        with:
          name: trivy-report.json
          path: trivy-report.json

      - name: Fail on critical Trivy
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 ## v0.35.0
        continue-on-error: true
        with:
          scan-type: "fs"
          format: table
          scan-ref: .
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true


  Image_build:
    needs: ["Check_Label","SAST","Run_Tests"]
    runs-on: "ubuntu-latest"
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd ## v6.3.0
        with:
          fetch-depth: 0

      - name: Initialize environment
        uses: ./.github/actions/setup-go-env

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 ## v4.0.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker build the image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  ## v7.0.0
        with:
          context: .
          push: false
          load: true ##  image available in the runner's local image store
          tags: "${{ env.IMAGE_TAG }}"
          platforms: linux/amd64
          #cache-from: type=gha # use github action cache ## cache failed with error RROR: failed to build: Cache export is not supported for the docker driver.Switch to a different driver, or turn on the containerd image store, and try again.
          #cache-to: type=gha,mode=max #push cache 

      - name: Run Trivy image vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 ## v0.35.0
        with:
          image-ref: "${{ env.IMAGE_TAG }}"
          format: 'json'
          exit-code: 0
          output: trivy-image-report.json
          vuln-type: 'os,library'

      - name: Upload Trivy docker image report as artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        if: ${{ !cancelled() }}
        with:
          name: trivy-image-report.json
          path: trivy-image-report.json

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 ## v0.35.0
        continue-on-error: true
        with:
          image-ref: "${{ env.IMAGE_TAG }}"
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          
      - name: push Docker image
        run: |
          docker push "${{ env.IMAGE_TAG }}"

  Open_Deployment_PR:
    needs: ["Check_Label","Run_Tests","Image_build"]
    runs-on: "ubuntu-latest"
    env:
      ## head_ref: Contains the name of the source branch of a pull request.
      ## ref_name: Contains the name of the branch or tag that triggered the workflow run.
      BRANCH_NAME: ${{ github.head_ref }}
      STAGE_DEPLOY_FILE: deployment/k8s/overlays/staging/api-deployment.yaml
      STABLE_DEPLOY_FILE: deployment/k8s/overlays/stable/movie-canary.yaml
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd ## v6.3.0
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: "Checkout new deployment branch"
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout staging
          git checkout -b deployment/${{ env.BRANCH_NAME }}

      - name: Change the image deployment tag
        run: |
          docker pull ${{ env.IMAGE_TAG }}
          export DIGEST=$(docker inspect ${{ env.IMAGE_TAG }} | jq -r --arg repo "${{ env.BASE_REPO }}" '.[0].RepoDigests[] | select(startswith($repo)) | split("@")[1]')
          sed -i "s|image: ${{ env.BASE_REPO }}.*|image: ${{ env.BASE_REPO }}@$DIGEST|g" ./${{ env.STABLE_DEPLOY_FILE }}
          sed -i "s|image: ${{ env.BASE_REPO }}.*|image: ${{ env.BASE_REPO }}@$DIGEST|g" ./${{ env.STAGE_DEPLOY_FILE }}
        
      - name: Push branch
        run: |
          git add ./${{ env.STABLE_DEPLOY_FILE }}
          git add ./${{ env.STAGE_DEPLOY_FILE }}
          git commit -m "Update deployment tag"
          git push origin deployment/${{ env.BRANCH_NAME }} --force

      # ok this will fail you need to open it at repo > settings > actions > general > allow workflow to create PR smth like that
      # option 2 to create personal access token create secret and put it instead the secrets.GITHUB_TOKEN
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Deploy ${{ env.BRANCH_NAME }}" \
            --body "Updating image tag to ${{ env.IMAGE_TAG }}" \
            --base staging \
            --label delete \
            --head deployment/${{ env.BRANCH_NAME }} \
            || echo "PR already exists, skipping creation"



          

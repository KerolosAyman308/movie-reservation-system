apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: movie-staging

resources:
- ../../base
- api-deployment.yaml
- cosign-cluster-policy.yaml
- namespace.yaml

patches:
  - path: api-hpa.yaml
  - target:
      group: rbac.authorization.k8s.io
      version: v1
      kind: RoleBinding
      name: job-garage-role-binding
    patch: |-
      - path: /subjects/0/namespace
        op: replace
        value: movie-staging
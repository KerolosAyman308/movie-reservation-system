apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: movies-rollout
spec:
  selector:
    matchLabels:
      app: movie-backend
  template:
    metadata:
      labels:
        app: movie-backend
        enforce-movie-stable: "true"
    spec:
      volumes:
        - name: shared-migration
          emptyDir: {}
        - name: shared-env
          emptyDir: {}
        - name: api-env
          secret:
            secretName: api-secret
        - name: aws-secret
          secret:
            secretName: garage-app-secret
      initContainers:
        - name: waiting-for-db
          image: busybox:latest
          command: ["/bin/sh", "-c"]
          args: 
            - |
              until nc -z db-statefulset-0.db-service 3306; do 
                sleep 2; 
              done;
              echo "DB is UP"
              until nc -z garage-0.garage-service 3900; do 
                sleep 2; 
              done;
              echo "Garage is UP"
        - name: copy-migration
          image: kerolosayman308/movie-reservation@sha256:1ac7926ad41eb468b92e2b0d8f2db3cb99e1c50c5d26e8c9ffdb092054e268a2
          command:
            - sh
            - "-c"
            - "cp -R /prod/migrations/. /migrations"
          volumeMounts:
            - mountPath: /migrations
              name: shared-migration
        - name: apply-migrations
          image: arigaio/atlas:1.1.5-alpine
          command: ["sh"]
          args: ["-c", "atlas migrate apply --dir file:///migrations --url mysql://$MYSQL_PASSWORD:$MYSQL_USER@db-statefulset-0.db-service:3306/$MYSQL_DATABASE"]
          envFrom:
            - secretRef:
                name: db-secret
          volumeMounts:
            - mountPath: /migrations
              name: shared-migration
        - name: config-env
          image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
          command: ["/bin/sh", "-c"]
          args: 
            - |
              touch /prod/.env
              cat /secrets/.app-env > /prod/.env
              echo "\n" >>  /prod/.env
              cat /aws/.aws-secret >> /prod/.env
          volumeMounts:
          - mountPath: /secrets/.app-env
            name: api-env
            subPath: .env
          - mountPath: /aws/.aws-secret
            name: aws-secret
            subPath: .secrets
          - mountPath: /prod/
            name: shared-env
      containers:
      - image: kerolosayman308/movie-reservation@sha256:1ac7926ad41eb468b92e2b0d8f2db3cb99e1c50c5d26e8c9ffdb092054e268a2
        name: movie-reservation
        volumeMounts:
          - mountPath: /prod/.env
            subPath: .env
            name: shared-env
        ports:
        - containerPort: 8000
        resources: 
          request:
            memory: 100Mi
            cpu: "0.2"
  strategy:
    canary: 
      canaryService: api-service-canary
      stableService: api-service-stable
      maxSurge: '25%'
      maxUnavailable: 0
      trafficRouting:
        nginx:
          stableIngress: movie-route
      steps:
        - setWeight: 10
        - pause:
            duration: 2m
        - setWeight: 20
        - pause: 
            duration: 2m 
        - setWeight: 50
        - pause: 
            duration: 2m 
        - setWeight: 100
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "1"
  name: job-garage-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-garage-role
subjects:
- kind: ServiceAccount
  name: garage-job
  namespace: default